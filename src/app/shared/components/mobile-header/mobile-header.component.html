<header class="mobile-header">
  <button type="button" class="mobile-header__icon-button" (click)="menuClick.emit()" aria-label="Abrir menu">
    <lucide-icon name="Menu" size="22"></lucide-icon>
  </button>

  <div class="mobile-header__brand">
    <span class="mobile-header__logo">🐾</span>
    <span class="mobile-header__name">Petslike</span>
  </div>

  <div class="mobile-header__actions">
    <button type="button" class="mobile-header__icon-button" aria-label="Buscar">
      <lucide-icon name="Search" size="20"></lucide-icon>
    </button>
    <button type="button" class="mobile-header__icon-button" aria-label="Notificações">
      <lucide-icon name="Bell" size="20"></lucide-icon>
      <span class="mobile-header__badge" aria-hidden="true"></span>
    </button>
  </div>
</header>
