<article class="post">
  <header class="post__header">
    <img
      [src]="post.petImage || post.author.image"
      [alt]="post.petName || post.author.name"
      class="post__avatar"
    />

    <div class="post__info">
      <div class="post__pet">{{ post.petName || post.author.name }}</div>
      <div class="post__meta">
        <span class="post__owner">{{ post.author.name }}</span>
        <span class="post__separator" aria-hidden="true">•</span>
        <span>{{ getRelativeTime(post.timestamp) }}</span>
      </div>
    </div>
  </header>

  <p class="post__text" *ngIf="post.text">{{ post.text }}</p>

  <figure class="post__media" *ngIf="post.images.length">
    <img *ngFor="let image of post.images" [src]="image" alt="Foto publicada" />
  </figure>

  <footer class="post__footer">
    <button type="button" class="post__action" [class.post__action--active]="post.liked" (click)="handleLike()">
      <lucide-icon name="PawPrint" size="18"></lucide-icon>
      <span>{{ post.likes }}</span>
    </button>
    <button type="button" class="post__action">
      <lucide-icon name="MessageCircle" size="18"></lucide-icon>
      <span>{{ post.comments }}</span>
    </button>
    <button type="button" class="post__action">
      <lucide-icon name="Share2" size="18"></lucide-icon>
      <span>{{ post.shares }}</span>
    </button>
  </footer>
</article>
